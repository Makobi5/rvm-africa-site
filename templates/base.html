<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronnie & Vero Ministries Africa</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #00B4D8;
            --navy-blue: #003049;
            --dim-red: #8B0000; /* As requested: a dim/dark red */
        }
        
        .navbar { background-color: #fff; border-bottom: 3px solid var(--sky-blue); }
        .nav-link { color: var(--navy-blue) !important; font-weight: 600; }
        
        .hero-section {
            background: linear-gradient(rgba(0,48,73,0.7), rgba(0,48,73,0.7)), url('/static/images/hero.jpg');
            background-size: cover;
            height: 80vh;
            display: flex;
            align-items: center;
            color: white;
        }

        .btn-primary { background-color: var(--sky-blue); border: none; }
        .btn-primary:hover { background-color: var(--navy-blue); }
        .btn-donate { background-color: var(--dim-red); color: white; border-radius: 20px; padding: 10px 25px; }
        
        .card-ministry { border: none; transition: 0.3s; }
        .card-ministry:hover { transform: translateY(-10px); }
    </style>
</head>
<body>

    <!-- Navbar (Freedom Chapel style) -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#" style="color: var(--navy-blue); font-weight: bold;">RVM AFRICA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Ministries</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Farming</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-donate" href="#">DONATE</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="py-5" style="background: var(--navy-blue); color: white;">
        <div class="container text-center">
            <p>&copy; 2024 Ronnie and Vero Ministries Africa. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
